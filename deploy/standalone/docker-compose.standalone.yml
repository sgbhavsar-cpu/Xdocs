# Xdocs standalone deployment.
#
# One-command bring-up of Postgres (pgvector), Redis, MinIO, and the API on a
# fresh host. The database schema uses `Docs_`-prefixed tables (schema.sql) and
# the API is started with DB_TABLE_PREFIX=Docs_ so it targets them. Alembic is
# NOT used here — schema.sql is applied by Postgres on first init.
#
#   cp .env.example .env   # then edit secrets / JWKS / CORS
#   docker compose -f docker-compose.standalone.yml up -d --build
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xdocs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xdocs}
      POSTGRES_DB: ${POSTGRES_DB:-xdocs}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Applied automatically the first time the data directory is initialized.
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xdocs}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: create the media bucket, then exit.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-xdocs-media} &&
      echo 'bucket ready'"

  api:
    build: ../../backend
    env_file: [.env]
    # Schema is created by Postgres from schema.sql — skip Alembic entirely.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8000:8000"]

volumes:
  pgdata:
  miniodata:
