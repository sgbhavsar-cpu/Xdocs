# Xdocs dev stack (Phase 0 / Milestone M0 walking skeleton).
# Brings up Postgres+pgvector, Redis, MinIO, the FastAPI API, and the test host
# (static page + Node mock-IdP). Worker and PDF services are added in later phases.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: xdocs
      POSTGRES_PASSWORD: xdocs
      POSTGRES_DB: xdocs
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xdocs"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    env_file: [.env]
    environment:
      # Inside the compose network the API reaches the mock-IdP by service name.
      JWKS_URL: http://test-host:8080/.well-known/jwks.json
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    ports: ["8000:8000"]
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes: ["./backend:/app"]

  test-host:
    build: ./examples/test-host
    env_file: [.env]
    environment:
      API_PUBLIC_URL: http://localhost:8000
    ports: ["8080:8080"]
    volumes:
      - ./examples/test-host:/srv
      - ./frontend/dist:/srv/public/dist:ro

volumes:
  pgdata:
  miniodata:
